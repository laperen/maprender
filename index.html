<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Treck</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
      {
          "imports": {
              "three": "./libraries/three/three.module.min.js",
              "three/addons/": "./libraries/three/examples/jsm/",
              "three-mesh-bvh": "./libraries/threeMeshBVH9.8.min.js"
          }
      }
  </script>
</head>
<body>

  <!-- UI Overlay -->
  <div id="ui">
    <header>
      <div class="logo">
        <span class="logo-mark">⬡</span>
        <span class="logo-text">Air<em>Treck</em></span>
      </div>
      <!--p class="tagline">Map data → 3D world</p-->
    </header>

    <div id="ui-scroll">
    <section id="controls">
      <div class="control-group">
        <label for="location-input">Location</label>
        <div class="input-row">
          <input type="text" id="location-input" placeholder="e.g. Tokyo, Japan" />
          <button id="search-btn">Go</button>
        </div>
      </div>

      <div class="control-group">
        <label>Coordinates</label>
        <div class="coord-row">
          <input type="number" id="lat-input" placeholder="Lat" step="0.0001" value="35.6812" />
          <input type="number" id="lng-input" placeholder="Lng" step="0.0001" value="139.7671" />
        </div>
      </div>

      <div class="control-group">
        <label for="style-select">Map Style</label>
        <select id="style-select">
          <option value="streets">Streets</option>
          <option value="satellite">Satellite</option>
          <option value="terrain">Terrain</option>
          <option value="dark">Dark Matter</option>
        </select>
      </div>

      <div class="control-group">
        <label for="radius-slider">Area Radius <span id="radius-val">500m</span></label>
        <input type="range" id="radius-slider" min="200" max="2000" step="100" value="500" />
      </div>

      <div class="control-group">
        <label for="height-slider">Building Height Scale <span id="height-val">1.0×</span></label>
        <input type="range" id="height-slider" min="1" max="10" step="1" value="2" />
      </div>

      <!-- Collapsible: Time of Day -->
      <div class="collapsible-section">
        <button class="collapsible-header" id="tod-toggle" aria-expanded="false">
          <span class="collapsible-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            Time of Day
          </span>
          <span class="collapsible-meta" id="tod-meta">☀ 12:00</span>
          <svg class="collapsible-chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="collapsible-body" id="tod-body">
          <div id="time-panel-host"></div>
        </div>
      </div>

      <!-- Collapsible: Clouds & Weather -->
      <div class="collapsible-section">
        <button class="collapsible-header" id="cloud-toggle" aria-expanded="false">
          <span class="collapsible-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
            Clouds &amp; Weather
          </span>
          <span class="collapsible-meta" id="cloud-meta">⛅ 40%</span>
          <svg class="collapsible-chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="collapsible-body" id="cloud-body">
          <div id="cloud-panel-host"></div>
        </div>
      </div>

    </section>
    </div><!-- /#ui-scroll -->


    <!-- Sticky bottom: always visible -->
    <div id="sticky-bottom">
      <div class="sticky-mode-row">
        <label class="sticky-label">Render Mode</label>
        <div class="toggle-row">
          <button class="mode-btn active" data-mode="solid">Solid</button>
          <button class="mode-btn" data-mode="wireframe">Wireframe</button>
          <button class="mode-btn" data-mode="xray">X-Ray</button>
        </div>
      </div>
      <button id="generate-btn">Generate 3D World</button>
    </div>
    <section id="info-panel">
      <div id="status">Ready. Configure settings and click Generate.</div>
      <div id="stats" class="hidden">
        <span id="stat-buildings">— buildings</span>
        <span id="stat-roads">— road segments</span>
        <span id="stat-tris">— triangles</span>
      </div>
    </section>
  </div>

  <!-- Mini 2D map preview -->
  <div id="map-preview">
    <div id="map-preview-inner"></div>
    <div class="map-label">2D Preview</div>
  </div>

  <!-- Three.js canvas target -->
  <div id="canvas-container"></div>

  <!-- Tooltip -->
  <div id="tooltip" class="hidden"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
