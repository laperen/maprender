<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terra3D — Map to 3D World</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
      {
          "imports": {
              "three": "./libraries/three/three.module.min.js",
              "three/addons/": "./libraries/three/examples/jsm/",
              "three-mesh-bvh": "./libraries/threeMeshBVH9.8.min.js"
          }
      }
  </script>
</head>
<body>

  <!-- UI Overlay -->
  <div id="ui">
    <header>
      <div class="logo">
        <span class="logo-mark">⬡</span>
        <span class="logo-text">Terra<em>3D</em></span>
      </div>
      <p class="tagline">Map data → 3D world</p>
    </header>

    <section id="controls">
      <div class="control-group">
        <label for="location-input">Location</label>
        <div class="input-row">
          <input type="text" id="location-input" placeholder="e.g. Tokyo, Japan" />
          <button id="search-btn">Go</button>
        </div>
      </div>

      <div class="control-group">
        <label>Coordinates</label>
        <div class="coord-row">
          <input type="number" id="lat-input" placeholder="Lat" step="0.0001" value="35.6812" />
          <input type="number" id="lng-input" placeholder="Lng" step="0.0001" value="139.7671" />
        </div>
      </div>

      <div class="control-group">
        <label for="style-select">Map Style</label>
        <select id="style-select">
          <option value="streets">Streets</option>
          <option value="satellite">Satellite</option>
          <option value="terrain">Terrain</option>
          <option value="dark">Dark Matter</option>
        </select>
      </div>

      <div class="control-group">
        <label for="radius-slider">Area Radius <span id="radius-val">500m</span></label>
        <input type="range" id="radius-slider" min="200" max="2000" step="100" value="500" />
      </div>

      <div class="control-group">
        <label for="height-slider">Building Height Scale <span id="height-val">1.0×</span></label>
        <input type="range" id="height-slider" min="1" max="10" step="1" value="2" />
      </div>

      <div class="control-group">
        <label>Render Mode</label>
        <div class="toggle-row">
          <button class="mode-btn active" data-mode="solid">Solid</button>
          <button class="mode-btn" data-mode="wireframe">Wireframe</button>
          <button class="mode-btn" data-mode="xray">X-Ray</button>
        </div>
      </div>

      <!-- ── Sun Controls ──────────────────────────────────── -->
      <div class="control-group">
        <label>Sun &amp; Lighting</label>
        <div class="sun-panel">

          <!-- Dial + label side-by-side -->
          <div class="sun-dial-wrap">
            <svg id="sun-dial" viewBox="0 0 64 64" width="64" height="64">
              <!-- Compass ring -->
              <circle cx="32" cy="32" r="30" fill="none" stroke="#1e2130" stroke-width="1.5"/>
              <!-- Cardinal labels -->
              <text x="32" y="7"  text-anchor="middle" font-size="7" fill="#4a5270">N</text>
              <text x="32" y="62" text-anchor="middle" font-size="7" fill="#4a5270">S</text>
              <text x="4"  y="35" text-anchor="middle" font-size="7" fill="#4a5270">W</text>
              <text x="60" y="35" text-anchor="middle" font-size="7" fill="#4a5270">E</text>
              <!-- Tick marks -->
              <line x1="32" y1="3" x2="32" y2="8"  stroke="#1e2130" stroke-width="1"/>
              <line x1="32" y1="56" x2="32" y2="61" stroke="#1e2130" stroke-width="1"/>
              <line x1="3"  y1="32" x2="8"  y2="32" stroke="#1e2130" stroke-width="1"/>
              <line x1="56" y1="32" x2="61" y2="32" stroke="#1e2130" stroke-width="1"/>
              <!-- Centre -->
              <circle cx="32" cy="32" r="2" fill="#4a5270"/>
              <!-- Hand line -->
              <line id="sun-dial-hand" x1="32" y1="32" x2="60" y2="32"
                    stroke="#ffd060" stroke-width="1.5" stroke-linecap="round"/>
              <!-- Sun dot -->
              <circle id="sun-dial-dot" cx="60" cy="32" r="6" fill="#ffd060"/>
            </svg>
            <span id="sun-dial-label" class="sun-dial-label">10:00AM</span>
          </div>

          <!-- Mode buttons -->
          <div class="toggle-row sun-mode-row">
            <button id="sun-mode-device" class="mode-btn" title="Use device clock">⏱ Now</button>
            <button id="sun-mode-time"   class="mode-btn active" title="Set time of day">🕐 Time</button>
            <button id="sun-mode-manual" class="mode-btn" title="Manual angles">✦ Manual</button>
          </div>

          <!-- Time-of-day slider (shown in 'time' mode) -->
          <div id="sun-time-row" class="sun-sub-row">
            <div class="sun-sub-label">
              <span>Time of day</span>
              <span id="sun-time-val" class="accent-val">10:00 AM</span>
            </div>
            <input type="range" id="sun-time-slider"
                   min="0" max="24" step="0.25" value="10" />
            <div class="sun-time-ticks">
              <span>12AM</span><span>6AM</span><span>12PM</span><span>6PM</span><span>12AM</span>
            </div>
          </div>

          <!-- Manual elevation + azimuth (shown in 'manual' mode) -->
          <div id="sun-manual-row" class="sun-sub-row hidden">
            <div class="sun-sub-label">
              <span>Elevation</span>
              <span id="sun-elev-val" class="accent-val">45°</span>
            </div>
            <input type="range" id="sun-elev-slider"
                   min="-10" max="90" step="1" value="45" />

            <div class="sun-sub-label" style="margin-top:8px">
              <span>Azimuth</span>
              <span id="sun-azi-val" class="accent-val">135°</span>
            </div>
            <input type="range" id="sun-azi-slider"
                   min="0" max="360" step="1" value="135" />
          </div>

        </div><!-- /sun-panel -->
      </div>

      <button id="generate-btn">Generate 3D World</button>
    </section>

    <section id="info-panel">
      <div id="status">Ready. Configure settings and click Generate.</div>
      <div id="stats" class="hidden">
        <span id="stat-buildings">— buildings</span>
        <span id="stat-roads">— road segments</span>
        <span id="stat-tris">— triangles</span>
      </div>
    </section>
  </div>

  <!-- Mini 2D map preview -->
  <div id="map-preview">
    <div id="map-preview-inner"></div>
    <div class="map-label">2D Preview</div>
  </div>

  <!-- Three.js canvas target -->
  <div id="canvas-container"></div>

  <!-- Tooltip -->
  <div id="tooltip" class="hidden"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
