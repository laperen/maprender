<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terra3D — Map to 3D World</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
      {
          "imports": {
              "three": "./libraries/three/three.module.min.js",
              "three/addons/": "./libraries/three/examples/jsm/",
              "three-mesh-bvh": "./libraries/threeMeshBVH9.8.min.js"
          }
      }
  </script>
</head>
<body>

  <!-- UI Overlay -->
  <div id="ui">
    <header>
      <div class="logo">
        <span class="logo-mark">⬡</span>
        <span class="logo-text">Terra<em>3D</em></span>
      </div>
      <p class="tagline">Map data → 3D world</p>
    </header>

    <section id="controls">
      <div class="control-group">
        <label for="location-input">Location</label>
        <div class="input-row">
          <input type="text" id="location-input" placeholder="e.g. Tokyo, Japan" />
          <button id="search-btn">Go</button>
        </div>
      </div>

      <div class="control-group">
        <label>Coordinates</label>
        <div class="coord-row">
          <input type="number" id="lat-input" placeholder="Lat" step="0.0001" value="35.6812" />
          <input type="number" id="lng-input" placeholder="Lng" step="0.0001" value="139.7671" />
        </div>
      </div>

      <div class="control-group">
        <label for="style-select">Map Style</label>
        <select id="style-select">
          <option value="streets">Streets</option>
          <option value="satellite">Satellite</option>
          <option value="terrain">Terrain</option>
          <option value="dark">Dark Matter</option>
        </select>
      </div>

      <div class="control-group">
        <label for="radius-slider">Area Radius <span id="radius-val">500m</span></label>
        <input type="range" id="radius-slider" min="200" max="2000" step="100" value="500" />
      </div>

      <!--
        Height slider: internal value 1–10, divided by 2 in ui.js to give
        0.5×–5.0× multiplier. Default 2 = 1.0× (true real-world scale).
      -->
      <div class="control-group">
        <label for="height-slider">Building Height Scale <span id="height-val">1.0×</span></label>
        <input type="range" id="height-slider" min="1" max="10" step="1" value="2" />
      </div>

      <!--
        Time of day slider: 0 = noon, 50 = midnight, 100 = noon again.
        Drives scene.setTimeOfDay(t) where t = raw / 100.
      -->
      <div class="control-group">
        <label for="time-slider">Time of Day <span id="time-val">12:00 PM</span></label>
        <input type="range" id="time-slider" min="0" max="100" step="1" value="0" />
      </div>

      <div class="control-group">
        <label>Render Mode</label>
        <div class="toggle-row">
          <button class="mode-btn active" data-mode="solid">Solid</button>
          <button class="mode-btn" data-mode="wireframe">Wireframe</button>
          <button class="mode-btn" data-mode="xray">X-Ray</button>
        </div>
      </div>

      <button id="generate-btn">Generate 3D World</button>
    </section>

    <section id="info-panel">
      <div id="status">Ready. Configure settings and click Generate.</div>
      <div id="stats" class="hidden">
        <span id="stat-buildings">— buildings</span>
        <span id="stat-roads">— road segments</span>
        <span id="stat-tris">— triangles</span>
      </div>
    </section>
  </div>

  <!-- Mini 2D map preview -->
  <div id="map-preview">
    <div id="map-preview-inner"></div>
    <div class="map-label">2D Preview</div>
  </div>

  <!-- Three.js canvas target -->
  <div id="canvas-container"></div>

  <!-- Tooltip -->
  <div id="tooltip" class="hidden"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
