<!DOCTYPE html>
<html>
    <head>
        <title>Jukebox</title>
        <style>
            .hidden-player {
                width: 0;
                height: 0;
                opacity: 0;
                position: absolute;
            }
        </style>
    </head>
    <body>
        <!-- Hidden players -->

        <iframe id="soundcloud-player" class="hidden-player"></iframe>

        <audio id="audio-player" class="hidden-player"></audio>

        <!-- Controls -->
        <div id="controls">
            <input id="urlInput" placeholder="Paste link here">
            <button id="addbtn">Add</button>
            <button id="playbtn">Play</button>
            <button id="pausebtn">Pause</button>
            <button id="nextbtn">Next</button>
            <input type="range" min="0" max="100" value="50" onchange="setVolume(this.value)">
        </div>
        List:
        <ul id="audiolist"></ul>
    </body>
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <script type="module">
        import * as jukebox from "./jukebox.js";
        addbtn.onclick = ()=>{jukebox.addTrack(urlInput.value);};
        playbtn.onclick = jukebox.userPlay;
        pausebtn.onclick = jukebox.pause;
        nextbtn.onclick = jukebox.next;
    </script>
</html>
